# =============================================================================
# Blade Server - Configuration Profile Template
# =============================================================================
#
# Copy this file to configsrc/ and fill in your values:
#
#   mkdir -p configsrc
#   cp docs/config-template.conf configsrc/myprofile.conf
#   # edit configsrc/myprofile.conf
#   aserv-config-build configsrc/myprofile.conf
#
# configsrc/ is gitignored — its contents are never committed.
# config/*.enc is the encrypted output — safe to commit to git.
#
# See docs/secrets-config.md for the full guide.
# =============================================================================

# Profile name — also defines the output filename: config/<CONFIG_NAME>.enc
CONFIG_NAME="myprofile"

# Encryption password — you will type this at install time to decrypt.
# Set a strong unique passphrase before running aserv-config-build.
CONFIG_PASSWORD="change_me_before_encrypting"

# ---------------------------------------------------------------------------
# Git
# ---------------------------------------------------------------------------
GIT_USER_NAME="Your Name"
GIT_USER_EMAIL="you@example.com"

# ---------------------------------------------------------------------------
# GitHub
# ---------------------------------------------------------------------------
# Personal Access Token (classic) with repo + workflow scopes.
# Leave empty to authenticate interactively via 'gh auth login'.
GITHUB_TOKEN=""

# ---------------------------------------------------------------------------
# Cloudflare Tunnel
# ---------------------------------------------------------------------------
# Name of the Cloudflare tunnel to create (e.g. my-aserv-tunnel).
CLOUDFLARE_TUNNEL_NAME="aserv-tunnel"

# Public hostname exposed through the tunnel (e.g. chamber.example.com).
CLOUDFLARE_HOSTNAME=""

# Dashboard-managed tunnel token.
# Get it from: Cloudflare Zero Trust → Tunnels → <tunnel> → Configure → token
# When set, install.sh and aserv-setup-cloudflare skip the login/create flow
# and use: cloudflared tunnel run --token <token>
# CLOUDFLARE_TUNNEL_NAME and CLOUDFLARE_HOSTNAME are ignored when token is set.
CLOUDFLARE_TUNNEL_TOKEN=""

# ---------------------------------------------------------------------------
# Azure
# ---------------------------------------------------------------------------
# Subscription ID to set as default after 'az login'.
# Leave empty to select interactively.
AZURE_SUBSCRIPTION_ID=""

# ---------------------------------------------------------------------------
# SSH
# ---------------------------------------------------------------------------
SSH_PORT="22"

# ---------------------------------------------------------------------------
# OpenChamber
# ---------------------------------------------------------------------------
OPENCHAMBER_PORT="3210"
OPENCHAMBER_PASSWORD=""

# ---------------------------------------------------------------------------
# OpenCode
# ---------------------------------------------------------------------------
# Password for the OpenCode web UI (--ui-password flag).
OPENCODE_UI_PASSWORD=""
OPENCODE_PORT="3000"
OPENCODE_HOSTNAME="0.0.0.0"

# ---------------------------------------------------------------------------
# Tailscale
# ---------------------------------------------------------------------------
# Pre-authentication key for headless Tailscale join.
# Leave empty to run 'tailscale up' interactively.
TAILSCALE_AUTH_KEY=""
